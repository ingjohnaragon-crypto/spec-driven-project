version: "3.9"

services:
  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openspec
      APP_NAME: open-spec-base-app
      APP_VERSION: 0.1.0
      ENVIRONMENT: development
    depends_on:
      - postgres
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openspec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openspec"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: openspec_postgres_data
